name: CI

on:
  push:
    branches-ignore: ['development']   # development is built + auto-merged by development-automerge.yml
    tags-ignore: ['v*']                # tag pushes are handled by release.yml
  pull_request:
    branches: ['**']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test (JDK 25)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build and run the full test suite
        run: ./mvnw -B -ntp clean verify -DbuildNumber="${{ github.run_number }}" -DgitSha="${{ github.sha }}"

      - name: Publish test report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: surefire-reports
          path: target/surefire-reports/
          if-no-files-found: ignore
