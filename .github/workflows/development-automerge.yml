name: Development auto-merge

# Development happens on the `development` branch. On every push to it, this
# workflow runs the full build and test suite; if (and only if) everything
# passes, it fast-forwards `main` up to the passing commit (falling back to a
# merge commit if the branches have diverged). If anything fails, `main` is
# left untouched.
#
# The push to `main` uses the built-in GITHUB_TOKEN, which by design does not
# retrigger workflows, so there is no loop.
#
# After merging, it also cuts a release automatically. The version bump is derived
# from the commit messages since the last release tag (Conventional Commits, plus
# explicit [minor]/[major] markers): a feature bumps the minor, a breaking change
# bumps the major, anything else bumps the patch. It then pushes the new tag and
# triggers the Release workflow on it. (A GITHUB_TOKEN tag push does not fire the
# release's push trigger, so the release is started via an explicit
# workflow_dispatch, which does run from the token.) You can still push a vX.Y.Z
# tag by hand any time to force a specific version.

on:
  push:
    branches: [development]

permissions:
  contents: write
  actions: write   # to dispatch the Release workflow after merging

# Serialize merges so two quick pushes can't race to update main.
concurrency:
  group: development-automerge
  cancel-in-progress: false

jobs:
  verify-and-merge:
    name: Verify and merge to main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history so main can be fast-forwarded/merged

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build and run the full test suite
        run: ./mvnw -B -ntp clean verify -DbuildNumber="${{ github.run_number }}" -DgitSha="${{ github.sha }}"

      - name: Fast-forward main to this passing commit
        run: |
          git config user.name "Fotios Kitsantas"
          git config user.email "fkitsantas@icloud.com"
          git fetch origin main
          git checkout -B main origin/main
          if git merge --ff-only "${GITHUB_SHA}"; then
            echo "main fast-forwarded to ${GITHUB_SHA}"
          else
            git merge --no-edit "${GITHUB_SHA}" \
              -m "Merge development into main (${GITHUB_SHA::7})"
            echo "main merged (non-fast-forward)"
          fi
          git push origin main

      - name: Auto-tag the next semantic version and trigger a release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --tags --force --quiet origin
          # Latest semantic-version tag (vMAJOR.MINOR.PATCH); ignores legacy shapes
          # like v.0.0.7. Falls back to v0.0.0 for a fresh repo.
          LATEST="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n1)"
          LATEST="${LATEST:-v0.0.0}"
          IFS=. read -r MAJOR MINOR PATCH <<< "${LATEST#v}"

          # Decide the bump from the commit messages since the last release, so the
          # version reflects what actually changed instead of only ever bumping patch:
          #   major - a breaking change: 'BREAKING CHANGE' in a body, a Conventional
          #           Commit '<type>!:' subject, or an explicit '[major]' marker
          #   minor - a new feature: a 'feat:'/'feat(scope):' subject, or '[minor]'
          #   patch - anything else (fixes, docs, chores, refactors, free-form)
          RANGE="${LATEST}..HEAD"
          git rev-parse -q --verify "refs/tags/${LATEST}" >/dev/null 2>&1 || RANGE="HEAD"
          MSGS="$(git log --format='%B' ${RANGE})"
          if grep -qiE 'BREAKING CHANGE|^[a-z]+(\([^)]*\))?!:|\[major\]' <<< "$MSGS"; then
            BUMP=major; NEXT="v$((MAJOR + 1)).0.0"
          elif grep -qiE '^feat(\([^)]*\))?:|\[minor\]' <<< "$MSGS"; then
            BUMP=minor; NEXT="v${MAJOR}.$((MINOR + 1)).0"
          else
            BUMP=patch; NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          if git rev-parse -q --verify "refs/tags/${NEXT}" >/dev/null; then
            echo "Tag ${NEXT} already exists, nothing to release."
            exit 0
          fi
          echo "Latest release tag ${LATEST}, bump=${BUMP} -> tagging ${NEXT}"
          git tag -a "${NEXT}" -m "Release ${NEXT}" "${GITHUB_SHA}"
          git push origin "${NEXT}"
          # workflow_dispatch on the new tag ref: the Release workflow then sees
          # github.ref = refs/tags/${NEXT} and builds/publishes it exactly as a
          # hand-pushed tag would (workflow_dispatch runs even from GITHUB_TOKEN).
          gh workflow run release.yml --repo "${GITHUB_REPOSITORY}" --ref "${NEXT}"
