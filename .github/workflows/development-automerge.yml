name: Development auto-merge

# Development happens on the `development` branch. On every push to it, this
# workflow runs the full build and test suite; if (and only if) everything
# passes, it merges `development` into the protected `main` branch through a
# pull request (main requires a PR, so a direct push is not possible), then
# fast-forwards `development` back up to the new `main` so the two stay in
# lockstep. If the build fails, `main` is left untouched.

on:
  push:
    branches: [development]

permissions:
  contents: write
  pull-requests: write

# Serialize so two quick pushes cannot race to update main.
concurrency:
  group: development-automerge
  cancel-in-progress: false

jobs:
  verify-and-merge:
    name: Verify and merge to main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and run the full test suite
        run: ./mvnw -B -ntp clean verify -DbuildNumber="${{ github.run_number }}" -DgitSha="${{ github.sha }}"

      - name: Merge development into main (only reached if the build passed)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin main
          if [ "$(git rev-parse origin/main)" = "${GITHUB_SHA}" ]; then
            echo "main already at this commit, nothing to merge."
            exit 0
          fi
          # Find an existing open development -> main PR, or open one.
          NUM="$(gh pr list --head development --base main --state open --json number --jq '.[0].number // empty')"
          if [ -z "$NUM" ]; then
            gh pr create --base main --head development \
              --title "Merge development into main" \
              --body "Automated: the full build and test suite passed on development."
            NUM="$(gh pr list --head development --base main --state open --json number --jq '.[0].number')"
          fi
          gh pr merge "$NUM" --merge
          # Keep development in lockstep with the new main (fast-forward; development
          # is a parent of the merge commit, so this is not a force update).
          git fetch origin main
          git push origin "$(git rev-parse origin/main):refs/heads/development"
