server.port=7777
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
logging.level.root=INFO
# Detailed, debuggable output for the whole service package (per-request lifecycle,
# per-image compression decisions, full stack traces). Surfaced live at GET /logs.
logging.level.com.github.fkitsantas.pdfcompressionservice=DEBUG

# ---------------------------------------------------------------------------
# Concurrency split: virtual threads handle request I/O, a bounded platform
# pool handles CPU-bound image work.
# ---------------------------------------------------------------------------
# Virtual threads for Spring MVC request handling: compress() blocks (PDF
# load/save I/O plus waiting on the image-processing pool), and virtual
# threads let many such blocking requests be in flight without tying up a
# small, fixed pool of OS carrier threads. Cheap to create/park, so this is
# purely about I/O-bound request concurrency.
spring.threads.virtual.enabled=true
# The actual per-image resize/encode work is CPU-bound (bicubic resampling,
# JPEG/CCITT/lossless encoding) and stays on PdfCompressionEngine's own
# bounded, daemon-threaded PLATFORM pool (see PdfCompressionProperties#parallelism
# / PdfCompressionExecutorConfig) - never on virtual threads. Virtual threads
# add no value for sustained CPU work and risk carrier-thread pinning under
# synchronized/native code paths (e.g. some ImageIO codecs), so the two pools
# are deliberately kept separate.

# ---------------------------------------------------------------------------
# PdfCompressionEngine tunables (see PdfCompressionProperties for bounds).
# ---------------------------------------------------------------------------
# Target resolution, in pixels-per-inch, that rendered image usage is downsampled towards.
pdf.compression.target-dpi=150
# Upper bound, in pixels, ever allowed for a recompressed image's width or height.
pdf.compression.max-image-dimension=3000
# JPEG encoder quality (0.0-1.0) used for photographic/grayscale recompression.
pdf.compression.jpeg-quality=0.75
# Images with either dimension below this many pixels are left untouched.
pdf.compression.min-dimension=16
# Images whose encoded (filtered) stream is smaller than this are left untouched.
pdf.compression.min-byte-size=8192
# Minimum fractional size reduction (0.0-1.0) a recompressed image/document must achieve to be used outright.
pdf.compression.min-reduction-ratio=0.10
# What to return when recompression does not clear min-reduction-ratio: keep_original or use_smallest.
pdf.compression.larger-result-policy=keep_original
# PDFBox scratch storage strategy while loading/writing documents: memory or temp_file.
pdf.compression.stream-cache=temp_file
# Whether CMYK images are recompressed at all (false leaves them untouched).
pdf.compression.recompress-cmyk=false
# Per-image resize/encode worker threads; 0 = auto (Runtime.availableProcessors()).
pdf.compression.parallelism=0
# Minimum eligible images before the parallel path is used instead of sequential.
pdf.compression.parallel-image-threshold=2
# Admission gate: max documents processed at once, bounding peak heap under
# virtual-thread request handling. 0 = auto (availableProcessors() * 4). Excess
# requests block (never rejected) until a permit frees up.
pdf.compression.max-concurrent-compressions=0
